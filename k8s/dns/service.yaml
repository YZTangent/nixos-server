apiVersion: v1
kind: Service
metadata:
  name: adguard-home
  namespace: dns
spec:
  type: NodePort
  ports:
  - port: 53
    targetPort: 53
    protocol: UDP
    name: dns-udp
  - port: 53
    targetPort: 53
    protocol: TCP
    name: dns-tcp
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: admin
  selector:
    app: adguard-home
