# This is an example of what your sops-encrypted YAML secrets file should look like.
# When cloudflared generates a credential file, it is in JSON format.
# Because sops-nix decrypts YAML, we must embed the raw JSON inside a YAML block scalar using the `|` character.

# --- K3s Cluster Secrets ---
# The shared cluster token used by server and agent nodes to join the k3s cluster
k3s-token: "your-random-secure-k3s-cluster-token"

# The password used for keepalived VRRP to failover the VIP between nodes
k3s-vrrp-password: "your-secure-vrrp-password"

# --- Cloudflare Tunnel Secrets ---
cloudflared:
  # The unique tunnel for this specific host (for SSH, local admin, etc.)
  host-tunnel.json: |
    {
      "AccountTag": "your-account-tag-here",
      "TunnelSecret": "your-secret-base64-string",
      "TunnelID": "your-host-tunnel-uuid"
    }

  # The shared tunnel for the entire k3s cluster (for public web ingress)
  # (You only need to include this block on your 'compute' nodes)
  compute-tunnel.json: |
    {
      "AccountTag": "your-account-tag-here",
      "TunnelSecret": "your-secret-base64-string",
      "TunnelID": "your-compute-tunnel-uuid"
    }
