keys:
  - &thinkpad age1abc...  # TODO: replace with actual thinkpad public key (run: age-keygen -y /var/lib/sops-nix/key.txt)
  - &itx age1def...       # TODO: replace with actual itx public key
  - &strix-halo age1ghi...  # TODO: replace with actual strix-halo public key
  - &n95 age1jkl...         # TODO: replace with actual n95 public key

creation_rules:
  - path_regex: secrets/thinkpad.yaml$
    key_groups:
      - age:
        - *thinkpad
        - *strix-halo
        - *itx
        - *n95
  - path_regex: secrets/itx-5825u.yaml$
    key_groups:
      - age:
        - *itx
        - *thinkpad
        - *strix-halo
        - *n95
  - path_regex: secrets/strix-halo.yaml$
    key_groups:
      - age:
        - *strix-halo
        - *thinkpad
        - *itx
        - *n95
  - path_regex: secrets/n95.yaml$
    key_groups:
      - age:
        - *n95
        - *thinkpad
        - *strix-halo
        - *itx
