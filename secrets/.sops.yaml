keys:
  - &thinkpad age1abc...  # TODO: replace with actual thinkpad public key (run: age-keygen -y /var/lib/sops-nix/key.txt)
  - &itx age1def...       # TODO: replace with actual itx public key

creation_rules:
  - path_regex: secrets/thinkpad.yaml$
    key_groups:
      - age:
        - *thinkpad
  - path_regex: secrets/itx-5825u.yaml$
    key_groups:
      - age:
        - *itx
